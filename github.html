<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugar Scan - 학교 급식 당류 분석</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-color: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --accent-color: #4a90e2;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: var(--card-color);
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            padding: 24px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 16px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-color);
            margin: 0;
        }

        header p {
            font-size: 13px;
            color: var(--text-sub);
            margin: 4px 0 0 0;
        }

        .section { margin-bottom: 24px; }
        .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

        .menu-card { background-color: #f8fafc; border-radius: 12px; padding: 16px; border: 1px solid #e2e8f0; min-height: 60px; }
        .menu-list { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: 1fr; gap: 6px; }
        .menu-list li { font-size: 15px; font-weight: 500; color: #475569; line-height: 1.4; }

        .sugar-badge { font-size: 32px; font-weight: 800; color: #1e293b; margin: 8px 0; }
        
        .status-box { display: block; padding: 12px; border-radius: 12px; font-weight: 600; font-size: 14px; margin-top: 8px; box-sizing: border-box; width: 100%; text-align: center; }
        .status-box.high { background-color: #fee2e2; color: #991b1b; }
        .status-box.warn { background-color: #ffedd5; color: #9a3412; }
        .status-box.safe { background-color: #dcfce7; color: #166534; }

        .status-desc { font-size: 13px; color: var(--text-sub); margin-top: 8px; line-height: 1.4; }

        .exercise-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .exercise-item { background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; font-size: 14px; display: flex; flex-direction: column; gap: 4px; }
        .exercise-item span:last-child { font-weight: 700; color: #334155; }

        .tip-box { background-color: #eff6ff; border-left: 4px solid var(--accent-color); padding: 12px 16px; border-radius: 0 12px 12px 0; font-size: 13.5px; color: #1e40af; line-height: 1.5; }

        .date-selector { border-top: 2px solid #f0f0f0; padding-top: 20px; margin-top: 10px; }
        .week-tabs { display: flex; justify-content: space-between; gap: 6px; margin-bottom: 12px; }
        .week-btn { background: #e2e8f0; border: none; padding: 10px 0; border-radius: 20px; font-size: 13px; font-weight: 600; color: #475569; cursor: pointer; flex: 1; text-align: center; }
        .week-btn.active { background: #334155; color: #fff; }
        
        .btn-group { display: flex; gap: 8px; overflow-x: auto; padding: 6px 2px 12px 2px; margin-top: 8px; -webkit-overflow-scrolling: touch; }
        .date-btn { background-color: #f1f5f9; border: 1px solid #e2e8f0; padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; color: #64748b; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
        .date-btn.active { background-color: var(--accent-color); color: white; border-color: var(--accent-color); box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Sugar Scan</h1>
        <p>데이터로 보는 우리 학교 식단 인사이트</p>
    </header>

    <div class="section">
        <div class="section-title">🍚 오늘의 급식 (<span id="current-date">로딩중...</span>)</div>
        <div class="menu-card">
            <ul class="menu-list" id="menu-container"></ul>
        </div>
    </div>

    <div class="section">
        <div class="section-title">🍬 오늘의 추정 당류</div>
        <div class="sugar-badge" id="sugar-value">-</div>
    </div>

    <div class="section">
        <div class="section-title">🚨 위험도</div>
        <div id="status-badge" class="status-box"></div>
        <div id="status-text" class="status-desc">데이터를 불러오는 중입니다.</div>
    </div>

    <div class="section">
        <div class="section-title">🏃 당류 소모 운동량</div>
        <p style="font-size: 13px; color: var(--text-sub); margin-top: -6px; margin-bottom: 12px;">오늘 급식으로 섭취한 당류를 소모하려면</p>
        <div class="exercise-grid">
            <div class="exercise-item"><span>🚶 걷기</span><span id="ex-walk">-</span></div>
            <div class="exercise-item"><span>🏃 달리기</span><span id="ex-run">-</span></div>
            <div class="exercise-item"><span>🚴 자전거</span><span id="ex-bike">-</span></div>
            <div class="exercise-item"><span>⛹️ 줄넘기</span><span id="ex-rope">-</span></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">💡 건강 팁</div>
        <div class="tip-box" id="tip-text">-</div>
    </div>

    <div class="date-selector">
        <div class="section-title" style="font-size: 14px; color: var(--text-sub); margin-bottom: 8px;">📅 다른 날짜 보기</div>
        <div class="week-tabs">
            <button class="week-btn" id="week-btn-1">1주차</button>
            <button class="week-btn" id="week-btn-2">2주차</button>
            <button class="week-btn" id="week-btn-3">3주차</button>
            <button class="week-btn" id="week-btn-4">4주차</button>
            <button class="week-btn" id="week-btn-5">5주차</button>
        </div>
        <div class="btn-group" id="date-buttons-container"></div>
    </div>
</div>

    // UI 업데이트 함수
    function updateUI(itemData) {
        if (!itemData) return;
        
        document.getElementById('current-date').innerHTML = itemData.day;
        document.getElementById('sugar-value').innerHTML = itemData.sugar + "g";
        
        document.getElementById('status-badge').innerHTML = itemData.label;
        document.getElementById('status-badge').className = "status-box " + itemData.status;
        document.getElementById('status-text').innerHTML = itemData.desc;
        
        document.getElementById('ex-walk').innerHTML = "약 " + itemData.walk + "분";
        document.getElementById('ex-run').innerHTML = "약 " + itemData.run + "분";
        document.getElementById('ex-bike').innerHTML = "약 " + itemData.bike + "분";
        document.getElementById('ex-rope').innerHTML = "약 " + itemData.rope + "분";
        
        document.getElementById('tip-text').innerHTML = itemData.tip;

        // 식단 리스트 초기화 후 업데이트
        const menuUl = document.getElementById('menu-container');
        menuUl.innerHTML = "";
        itemData.menu.forEach(function(m) {
            const li = document.createElement('li');
            li.innerHTML = m;
            menuUl.appendChild(li);
        });

        // 하단 버튼 active 상태 관리
        const allDateBtns = document.querySelectorAll('.date-btn');
        for (let i = 0; i < allDateBtns.length; i++) {
            if (allDateBtns[i].getAttribute('data-id') === itemData.id) {
                allDateBtns[i].classList.add('active');
            } else {
                allDateBtns[i].classList.remove('active');
            }
        }
    }

    // 주차 선택 및 하단 버튼 생성 함수
    function setWeek(weekNum) {
        for (let i = 1; i <= 5; i++) {
            const btn = document.getElementById('week-btn-' + i);
            if (btn) {
                if (i === weekNum) btn.classList.add('active');
                else btn.classList.remove('active');
            }
        }

        const btnContainer = document.getElementById('date-buttons-container');
        btnContainer.innerHTML = "";

        const days = mealData[weekNum];
        if (!days) return;

        days.forEach(function(d) {
            const btn = document.createElement('button');
            btn.className = "date-btn";
            btn.setAttribute('data-id', d.id);
            btn.innerHTML = d.day.split('(')[0].trim();
            
            btn.onclick = function() {
                updateUI(d);
            };
            btnContainer.appendChild(btn);
        });
    }

    // ==========================================
    // 🚀 즉시 실행 구역 (자동 날짜 인식 로직 포함)
    // ==========================================
    try {
        // 상단 주차 버튼 클릭 이벤트 바인딩
        for (let i = 1; i <= 5; i++) {
            const btn = document.getElementById('week-btn-' + i);
            if (btn) {
                btn.onclick = function() {
                    setWeek(i);
                    updateUI(mealData[i][0]); // 주차를 바꾸면 해당 주 첫 번째 날짜 자동 표시
                };
            }
        }

        // 1. 기기의 오늘 날짜 확인 로직
        const now = new Date();
        const currentMonth = String(now.getMonth() + 1).padStart(2, '0');
        const currentDate = String(now.getDate()).padStart(2, '0');
        const todayId = currentMonth + "-" + currentDate; // 예: "06-02"

        // 2. 오늘 날짜가 6월 식단표 안에 존재하는지 탐색
        let foundWeek = 1;
        let foundData = null;

        for (let w = 1; w <= 5; w++) {
            if (mealData[w]) {
                for (let i = 0; i < mealData[w].length; i++) {
                    if (mealData[w][i].id === todayId) {
                        foundWeek = w;
                        foundData = mealData[w][i];
                        break; // 오늘 날짜를 찾으면 종료
                    }
                }
            }
            if (foundData) break;
        }

        // 3. 만약 오늘이 식단표에 없는 날(주말이나 타 월)이라면 기본값(6월 1일) 세팅
        if (!foundData) {
            foundWeek = 1;
            foundData = mealData[1][0]; 
        }

        // 4. 찾은 날짜를 기준으로 화면 초기화 및 렌더링
        setWeek(foundWeek);
        updateUI(foundData);

    } catch (error) {
        document.getElementById('status-text').innerHTML = "화면 렌더링 에러가 발생했습니다: " + error.message;
    }
</script>
